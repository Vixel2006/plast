name: Feature Request
description: Suggest an idea for plast
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Before filing, check if it's already covered by an open issue.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you considered instead?

  - type: checkboxes
    id: layers
    attributes:
      label: Where does this belong?
      description: Select the layer(s) this feature touches.
      options:
        - label: C / CUDA kernels
        - label: Scheduler / JIT
        - label: Python bindings (pybind11)
        - label: Python API (plast.nn, pipeline)
        - label: Documentation
