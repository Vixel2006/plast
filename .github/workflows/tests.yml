name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project
        run: |
          uv venv --python 3.12
          uv pip install -e ".[test]"

      - name: Run tests (CPU)
        run: uv run pytest tests/ -v --timeout=120 -m "not slow and not cuda"

  test-gpu:
    runs-on: [self-hosted, linux, x64, gpu]
    if: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project
        run: |
          uv venv --python 3.12
          uv pip install -e ".[test]"

      - name: Run tests
        run: uv run pytest tests/ -v --timeout=300 -m "not slow"
