name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests (CPU)
        run: |
          pytest tests/ -v --timeout=120 -m "not slow"

  test-gpu:
    runs-on: [self-hosted, linux, x64, gpu]
    if: false  # Disabled by default; enable when a self-hosted GPU runner is available
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run all tests (CPU + CUDA)
        run: |
          pytest tests/ -v --timeout=300 -m "not slow"
